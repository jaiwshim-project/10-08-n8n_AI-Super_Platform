<script>
const CATEGORIES = [
  { name: '고객 서비스', color: '#00d4ff', bg: 'rgba(0,212,255,0.1)' },
  { name: '콘텐츠 생성', color: '#7c3aed', bg: 'rgba(124,58,237,0.1)' },
  { name: '세일즈/마케팅', color: '#10b981', bg: 'rgba(16,185,129,0.1)' },
  { name: '데이터 분석', color: '#f59e0b', bg: 'rgba(245,158,11,0.1)' },
  { name: '교육/학습', color: '#6366f1', bg: 'rgba(99,102,241,0.1)' },
  { name: 'HR/채용', color: '#ec4899', bg: 'rgba(236,72,153,0.1)' },
  { name: '재무/회계', color: '#14b8a6', bg: 'rgba(20,184,166,0.1)' },
  { name: '법률/컴플라이언스', color: '#f97316', bg: 'rgba(249,115,22,0.1)' },

  { name: '공공/선거', color: '#a78bfa', bg: 'rgba(167,139,250,0.1)' },
];

const AGENTS = [
  // 고객 서비스 (10)
  { id:1, cat:'고객 서비스', icon:'💬', name:'24/7 고객 상담 AI', desc:'자연어 처리로 고객 질문을 24시간 자동 응대하며, 복잡한 문의는 상담사에게 에스컬레이션합니다.', fns:['FAQ 데이터베이스 RAG 검색','감정 분석 및 우선순위 분류','상담 이력 자동 기록 및 분석'], example:'전자상거래 고객이 주문 취소를 요청하면, 자동으로 주문 상태 조회 → 취소 처리 → 환불 안내까지 처리합니다.', n8n:'Webhook → AI Agent(GPT-4o) → IF(신뢰도) → HTTP Request(CRM API) → Slack(상담사 알림)' },
  { id:2, cat:'고객 서비스', icon:'🔄', name:'반품/환불 자동화 AI', desc:'반품 요청을 접수하고 정책에 따라 자동으로 처리하며 고객에게 실시간 상태를 안내합니다.', fns:['반품 정책 자동 검증','물류사 API 연동 픽업 예약','환불 처리 자동화'], example:'고객이 불량품 반품을 신청하면, 사진 분석 → 정책 확인 → 즉시 교환 승인 → 배송사 픽업 예약까지 자동 처리합니다.', n8n:'Webhook → Vision AI(불량 판정) → Google Sheets(이력) → HTTP Request(물류 API) → Email(확인 발송)' },
  { id:3, cat:'고객 서비스', icon:'⭐', name:'고객 만족도 분석 AI', desc:'VOC 데이터를 수집하고 감정 분석으로 서비스 품질을 실시간 모니터링합니다.', fns:['리뷰 감정 분석 (긍/부/중립)','불만 패턴 자동 분류','대시보드 자동 업데이트'], example:'네이버 리뷰 200개를 수집하여 AI가 분석한 결과 "배송 지연"이 주요 불만임을 파악, 해당 부서에 즉시 알립니다.', n8n:'Schedule → HTTP(리뷰 크롤링) → AI Agent(감정분석) → Google Sheets(집계) → Slack(주간 리포트)' },
  { id:4, cat:'고객 서비스', icon:'🎯', name:'개인화 추천 AI', desc:'고객 구매 이력과 행동 패턴을 분석하여 최적의 상품·서비스를 개인화 추천합니다.', fns:['협업 필터링 추천 알고리즘','실시간 행동 패턴 분석','A/B 테스트 자동화'], example:'IT 서적 3권 구매 후 AI가 "Python 머신러닝 완벽 가이드"를 추천, 전환율 32% 향상합니다.', n8n:'Webhook(세션데이터) → Code(행동분석) → AI Agent(추천생성) → HTTP Response(JSON)' },

  { id:52, cat:'HR/채용', icon:'📅', name:'면접 일정 자동화 AI', desc:'후보자와 면접관의 일정을 자동으로 조율하여 면접을 효율적으로 예약합니다.', fns:['캘린더 자동 동기화','후보자 자동 안내','면접 리마인더 발송'], example:'합격 이메일 발송 시 AI가 면접관 3명의 공통 가능 시간을 찾아 후보자에게 3개 옵션을 제시하고 선택 즉시 캘린더를 예약합니다.', n8n:'Webhook → Google Calendar API → AI(일정조율) → Email + Calendar 초대' },
  { id:53, cat:'HR/채용', icon:'🎯', name:'인재 소싱 AI', desc:'LinkedIn, GitHub 등에서 적합한 인재를 자동으로 발굴하고 개인화 아웃리치 메시지를 작성합니다.', fns:['수동 검색 자동화','인재 프로필 분석','개인화 아웃리치 메시지'], example:'React 시니어 개발자 채용 시 AI가 GitHub에서 관련 오픈소스 기여자 50명을 발굴하여 각자 기여 내용을 언급한 개인화 메시지를 발송합니다.', n8n:'Webhook → GitHub API + LinkedIn API → AI Agent(프로필분석) → Email' },
  { id:54, cat:'HR/채용', icon:'💬', name:'HR 챗봇 AI', desc:'직원들의 인사 관련 질문(연차, 복지, 규정 등)에 24시간 자동으로 응대합니다.', fns:['HR 정책 RAG 기반 응답','연차/경비 자동 처리','인사 담당자 연결'], example:'직원이 "출산 휴가 신청 방법"을 물으면 AI가 사내 규정을 검색하여 정확한 절차와 필요 서류를 즉시 안내합니다.', n8n:'Webhook → AI Agent(HR RAG) → IF(자동처리) → HR 시스템 API' },
  { id:55, cat:'HR/채용', icon:'📊', name:'조직 분석 AI', desc:'직원 데이터를 분석하여 이직 위험, 번아웃 징후, 조직 건강도를 자동으로 평가합니다.', fns:['이직 위험 예측 모델','팀 역학 분석','조직 건강도 대시보드'], example:'특정 팀의 야근 빈도, 성과 평가 하락, 휴가 미사용률을 종합 분석하여 번아웃 위험을 감지하고 HR에게 개입을 권고합니다.', n8n:'Schedule → HR 시스템 API → Code(위험분석) → AI(해석) → 관리자 Email' },
  { id:56, cat:'HR/채용', icon:'🎉', name:'온보딩 자동화 AI', desc:'신입사원의 입사부터 3개월 적응 기간까지 개인화된 온보딩 프로그램을 자동으로 운영합니다.', fns:['개인화 온보딩 체크리스트','멘토 자동 매칭','30/60/90일 체크인 자동화'], example:'신입사원 입사 당일 AI가 부서별 맞춤 온보딩 일정, 필수 교육 링크, 담당 멘토 소개를 자동으로 설정합니다.', n8n:'Webhook(입사정보) → AI(온보딩설계) → Calendar + Slack + Email(순서발송)' },
  { id:57, cat:'HR/채용', icon:'📈', name:'성과 관리 AI', desc:'직원 성과 목표(OKR/KPI) 설정, 진도 추적, 피드백을 자동화하여 성과 관리 효율을 높입니다.', fns:['OKR 진도 자동 추적','중간 피드백 자동 요청','성과 기여도 분석'], example:'분기 OKR 마감 2주 전 AI가 각 직원에게 현재 달성률과 남은 기간을 안내하고, 목표 달성이 어려운 항목에 대한 조언을 자동 발송합니다.', n8n:'Schedule → OKR 시스템 → AI(달성률분석) → Email(개인피드백)' },
  { id:58, cat:'HR/채용', icon:'📚', name:'교육 추천 AI', desc:'직원의 역할, 역량, 커리어 목표에 맞는 교육 과정과 자기계발 콘텐츠를 자동으로 추천합니다.', fns:['커리어 패스 분석','스킬 갭 자동 감지','맞춤 교육 큐레이션'], example:'데이터 분석가가 AI/ML 분야로 전환 목표를 설정하면 AI가 6개월 스킬업 계획과 추천 강의 리스트를 자동으로 수립합니다.', n8n:'Webhook → HR 시스템 → AI Agent(추천) → LMS API(수강신청)' },
  { id:59, cat:'HR/채용', icon:'🏢', name:'채용 분석 AI', desc:'채용 프로세스의 효율성, 다양성, 시간/비용을 분석하여 채용 전략 개선을 지원합니다.', fns:['채용 깔때기 분석','소스별 ROI 측정','다양성 지표 자동 추적'], example:'채용 데이터를 분석하여 LinkedIn 채용(42일/₩180만) vs 헤드헌터(65일/₩520만) 효율 차이를 파악합니다.', n8n:'Schedule(분기) → ATS API → Code(채용분석) → AI(인사이트) → Google Slides' },
  { id:60, cat:'HR/채용', icon:'🌈', name:'D&I 모니터링 AI', desc:'다양성, 형평성, 포용성(DEI) 지표를 자동으로 추적하고 개선 방향을 제안합니다.', fns:['DEI 지표 자동 수집','편향 패턴 감지','개선 로드맵 자동 생성'], example:'채용, 승진, 보상 데이터를 분석하여 특정 직군에서 성별 임금 격차가 있음을 감지하고 경영진에게 보고합니다.', n8n:'Schedule(분기) → HR API → Code(DEI분석) → AI(개선안) → 경영진 보고서' },

let currentFilter = '전체';
let currentSearch = '';

window.onload = () => { buildFilterTabs(); renderAgents(); };

function buildFilterTabs() {
  const tabs = document.getElementById('filterTabs');
  CATEGORIES.forEach(cat => {
    const count = AGENTS.filter(a => a.cat === cat.name).length;
    const tab = document.createElement('div');
    tab.className = 'filter-tab';
    tab.dataset.cat = cat.name;
    tab.innerHTML = `${cat.name} <span class="tab-count">${count}</span>`;
    tab.onclick = () => setFilter(tab);
    tabs.appendChild(tab);
  });
}

function setFilter(el) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.cat;
  renderAgents();
}

function filterAgents() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase();
  renderAgents();
}

function getFiltered() {
  return AGENTS.filter(a => {
    const catOk = currentFilter === '전체' || a.cat === currentFilter;
    const q = currentSearch;
    const searchOk = !q || a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q) || a.cat.toLowerCase().includes(q) || a.fns.some(f => f.toLowerCase().includes(q));
    return catOk && searchOk;
  });
}

function renderAgents() {
  const filtered = getFiltered();
  const grid = document.getElementById('agentGrid');
  const noResults = document.getElementById('noResults');
  grid.innerHTML = '';
  document.getElementById('visibleCount').textContent = filtered.length;
  if (!filtered.length) { noResults.style.display = 'block'; return; }
  noResults.style.display = 'none';
  const catMap = Object.fromEntries(CATEGORIES.map(c => [c.name, c]));
  filtered.forEach(agent => {
    const cat = catMap[agent.cat] || { color: '#00d4ff', bg: 'rgba(0,212,255,0.1)' };
    const div = document.createElement('div');
    div.className = 'agent-card';
    div.innerHTML = `
      <div class="agent-icon" style="background:${cat.bg}">${agent.icon}</div>
      <div class="agent-name">${agent.name}</div>
      <div class="agent-cat" style="background:${cat.bg};color:${cat.color}">${agent.cat}</div>
      <div class="agent-desc">${agent.desc}</div>
      <div class="agent-fns">${agent.fns.map(f => `<span class="fn-tag">${f}</span>`).join('')}</div>`;
    div.onclick = () => openModal(agent);
    grid.appendChild(div);
  });
}

function openModal(agent) {
  const catMap = Object.fromEntries(CATEGORIES.map(c => [c.name, c]));
  const cat = catMap[agent.cat] || { color: '#00d4ff', bg: 'rgba(0,212,255,0.1)' };
  document.getElementById('mIcon').textContent = agent.icon;
  document.getElementById('mIcon').style.background = cat.bg;
  document.getElementById('mName').textContent = agent.name;
  document.getElementById('mCat').textContent = agent.cat;
  document.getElementById('mCat').style.cssText = `background:${cat.bg};color:${cat.color}`;
  document.getElementById('mDesc').textContent = agent.desc;
  document.getElementById('mFns').innerHTML = agent.fns.map((f, i) =>
    `<div class="modal-fn"><div class="fn-num">${i+1}</div><div class="fn-text">${f}</div></div>`).join('');
  document.getElementById('mExample').innerHTML = `<strong>사례:</strong> ${agent.example}`;
  document.getElementById('mN8n').innerHTML = `<strong style="color:var(--text)">n8n 워크플로 구성:</strong><br><code>${agent.n8n}</code>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

function recommendAgents() {
  const query = document.getElementById('searchInput').value.trim();
  const kws = query.toLowerCase().split(/\s+/).filter(w => w.length > 1);
  let scored = AGENTS.map(a => {
    let s = 0;
    kws.forEach(kw => {
      if (a.name.toLowerCase().includes(kw)) s += 3;
      if (a.cat.toLowerCase().includes(kw)) s += 2;
      if (a.desc.toLowerCase().includes(kw)) s += 1;
      a.fns.forEach(f => { if (f.toLowerCase().includes(kw)) s += 1; });
    });
    return { agent: a, score: s };
  }).filter(x => x.score > 0).sort((a, b) => b.score - a.score).slice(0, 5);
  if (!scored.length) scored = [...AGENTS].sort(() => Math.random() - 0.5).slice(0, 3).map(a => ({ agent: a }));
  const recCards = document.getElementById('recCards');
  recCards.innerHTML = '';
  const catMap = Object.fromEntries(CATEGORIES.map(c => [c.name, c]));
  scored.forEach(({ agent }) => {
    const cat = catMap[agent.cat] || { color: '#00d4ff' };
    const card = document.createElement('div');
    card.className = 'rec-card';
    card.innerHTML = `<span>${agent.icon}</span><span style="color:${cat.color}">${agent.name}</span>`;
    card.onclick = () => openModal(agent);
    recCards.appendChild(card);
  });
  document.getElementById('recommendResult').classList.add('show');
}
</script>
